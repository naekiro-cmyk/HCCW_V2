<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light only" />
<title>HC Corporate Wellness — Coaching sportif en entreprise</title>
<meta name="description" content="Bootcamps, team building et coaching sportif en entreprise. Pour des équipes plus énergiques, plus soudées, et qui transpirent ensemble." />
<link rel="icon" type="image/png" href="assets/hc-favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&family=DM+Sans:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    color-scheme: light only;
    --bg:        #F4F4F5;
    --bg-alt:    #FFFFFF;
    --bg-deep:   #E9E9EB;
    --ink:       #0E0E10;
    --ink-soft:  #3F3F46;
    --ink-mute:  #71717A;
    --ink-faint: #A1A1AA;
    --line:      #D4D4D8;
    --line-soft: #E4E4E7;
    --paper:     #FAFAFA;
    --accent:    #FDD947;
    --display: 'Archivo', system-ui, sans-serif;
    --sans:    'DM Sans', system-ui, sans-serif;
    --mono:    'JetBrains Mono', ui-monospace, monospace;
    --max:   1480px;
    --pad:   clamp(20px, 4vw, 56px);
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth; background: var(--bg); color: var(--ink); color-scheme: light;}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  @media (prefers-color-scheme: dark){
    html, body{ background: #F4F4F5 !important; color: #0E0E10 !important; }
  }

  a{color:inherit; text-decoration:none;}
  img{max-width:100%; display:block;}
  button{font: inherit; cursor: pointer;}

  ::selection{ background: var(--ink); color: var(--paper); }

  .wrap{ max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); position:relative;}

  /* ========================================================= */
  /* ===========         TYPOGRAPHY SYSTEM        ============= */
  /* ========================================================= */

  .mono-label{
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-mute);
    display: block;
  }

  .h-eyebrow{
    display: inline-flex; align-items: center; gap: 14px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 36px;
  }
  .h-eyebrow__num{ color: var(--ink); font-weight: 600; }
  .h-eyebrow__dash{ height: 1px; flex: 0 0 36px; background: var(--ink-soft); }
  .h-eyebrow--inv{ color: rgba(250,250,250,.55); }
  .h-eyebrow--inv .h-eyebrow__num{ color: var(--paper); }
  .h-eyebrow--inv .h-eyebrow__dash{ background: rgba(250,250,250,.4); }

  .display-xl{
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(40px, 6.4vw, 96px);
    line-height: 0.92;
    letter-spacing: -0.045em;
    color: var(--ink);
    text-wrap: balance;
  }
  .display-xl em{ font-style: italic; font-weight: 500; }
  .display-xl__heavy{ font-weight: 900; }
  .display-xl--inv{ color: var(--paper); }

  .display-xxl{
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(56px, 9vw, 156px);
    line-height: 0.88;
    letter-spacing: -0.05em;
    color: var(--paper);
    text-wrap: balance;
  }
  .display-xxl em{ font-weight: 700; font-style: italic; }

  .lede{
    font-family: var(--sans);
    font-size: clamp(16px, 1.3vw, 19px);
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 52ch;
  }
  .lede strong{ color: var(--ink); font-weight: 600; }

  /* ========================================================= */
  /* ===========           BUTTONS               ============= */
  /* ========================================================= */
  .btn{
    display: inline-flex; align-items: center; gap: 14px;
    padding: 16px 22px;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background .25s, color .25s, border-color .25s, transform .25s;
    cursor: pointer;
    text-decoration: none;
  }
  .btn:hover{ background: var(--ink); color: var(--paper); }
  .btn--solid{ background: var(--ink); color: var(--paper); }
  .btn--solid:hover{ background: var(--accent); color: var(--ink); border-color: var(--accent); }
  .btn--ghost{ background: rgba(255,255,255,.85); backdrop-filter: blur(8px); border-color: var(--ink); }
  .btn--ghost:hover{ background: var(--ink); color: var(--paper); }
  .btn--lg{ padding: 22px 30px; font-size: 14px;}
  .btn__arrow{ display: inline-block; transition: transform .3s; font-family: var(--mono); }
  .btn:hover .btn__arrow{ transform: translateX(4px); }

  /* ========================================================= */
  /* ===========          REVEAL                 ============= */
  /* ========================================================= */
  .reveal{ opacity: 0; transform: translateY(28px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.is-in{ opacity: 1; transform: none; }

  /* ========================================================= */
  /* ===========             HERO                ============= */
  /* ========================================================= */
  .hero{
    position: relative;
    background: var(--bg);
    padding: 0;
    border-bottom: 1px solid var(--line);
  }
  .hero__inner{
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    padding: clamp(16px, 1.6vw, 22px);
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: clamp(16px, 1.6vw, 22px);
  }

  /* --- Top bar --- */
  .hero__topbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 4px;
    z-index: 5;
  }
  .hero__topbar-left{ display: flex; gap: 10px; align-items: center; flex-wrap: wrap;}
  .hero__chip{
    display: inline-flex; align-items: center;
    padding: 7px 12px;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .hero__chip--ghost{
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
  }
  .hero__topbar-right{
    display: flex; align-items: center; gap: 28px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .hero__topbar-right a{
    color: var(--ink-soft);
    transition: color .2s;
    position: relative;
  }
  .hero__topbar-right a:hover{ color: var(--ink); }
  .hero__cta-inline{
    color: var(--ink) !important;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 12px;
    background: var(--accent);
    transition: transform .2s !important;
  }
  .hero__cta-inline:hover{ transform: translateX(2px); }

  /* --- Stage (grid + overlay sit here together) --- */
  .hero__stage{
    position: relative;
    z-index: 1;
    min-height: 0;
  }

  /* --- Grid plane (back) --- */
  .hero__grid{
    position: relative;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: clamp(8px, 1vw, 14px);
    min-height: 70vh;
    height: 100%;
    z-index: 1;
  }
  @media (max-width: 880px){
    .hero__grid{
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(8, 1fr);
    }
  }

  .hero-tile{
    background: var(--bg-deep);
    overflow: hidden;
    position: relative;
  }
  .hero-tile--photo{
    background: #1A1A1D;
  }
  .hero-tile--accent{
    color: var(--ink);
    animation: accentBreathe 4.5s ease-in-out infinite;
  }
  @keyframes accentBreathe {
    0%, 100% { filter: brightness(1) saturate(1); }
    50% { filter: brightness(1.06) saturate(1.05); }
  }
  .hero-tile__accent-inner{
    position: absolute; inset: 0;
    padding: clamp(14px, 1.4vw, 22px);
    display: flex; flex-direction: column;
    justify-content: space-between;
  }
  .hero-tile__accent-num{
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(40px, 5vw, 80px);
    line-height: 0.9;
    letter-spacing: -0.04em;
    align-self: flex-end;
  }
  .hero-tile__accent-label{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .hero-tile--label{
    background: var(--ink);
    color: var(--paper);
    display: grid;
    place-items: center;
  }
  .hero-tile__bigchar{
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(44px, 5vw, 84px);
    letter-spacing: -0.04em;
  }

  .hero-tile--mono{
    background: var(--bg-alt);
    border: 1px solid var(--line-soft);
    display: flex;
    align-items: center;
    padding: 0 clamp(14px, 1.4vw, 22px);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* Multi-line list variant: tight stack inside the same square tile. */
  .hero-tile--mono-list{
    align-items: stretch;
    padding: clamp(10px, 1vw, 14px) clamp(12px, 1.2vw, 18px);
  }
  .hero-tile__list{
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(2px, 0.4vw, 6px);
    width: 100%;
    height: 100%;
  }
  .hero-tile__list li{
    font-family: var(--mono);
    font-size: clamp(9px, 0.85vw, 12px);
    font-weight: 500;
    letter-spacing: 0.12em;
    line-height: 1.15;
    color: var(--ink);
    position: relative;
    padding-left: 12px;
  }
  .hero-tile__list li::before{
    content: "+";
    position: absolute;
    left: 0;
    top: 0;
    font-family: var(--mono);
    font-weight: 600;
    color: var(--ink-soft);
    line-height: 1.15;
  }
  /* Crosshair corners on photo tiles */
  .hero-tile__crosshair{
    position: absolute;
    width: 16px; height: 16px;
    border: 1px solid var(--accent);
    z-index: 2;
    opacity: 0.85;
  }
  .hero-tile__crosshair--tl{
    top: 8px; left: 8px;
    border-right: 0; border-bottom: 0;
  }
  .hero-tile__crosshair--br{
    bottom: 8px; right: 8px;
    border-left: 0; border-top: 0;
  }

  /* --- Title overlay (front) --- */
  .hero__overlay{
    position: absolute;
    inset: 0;
    z-index: 4;
    display: grid;
    place-items: center;
    text-align: center;
    pointer-events: none;
    padding: clamp(20px, 4vw, 60px);
    transition: transform .3s ease-out;
  }
  .hero__overlay > *{ pointer-events: auto; }

  .hero__card{
    position: relative;
    max-width: min(960px, 76%);
    padding: clamp(24px, 3vw, 44px) clamp(28px, 4vw, 56px) clamp(28px, 3vw, 44px);
    background: rgba(244, 244, 245, 0.72);
    backdrop-filter: blur(14px) saturate(1.05);
    -webkit-backdrop-filter: blur(14px) saturate(1.05);
    border: 1px solid rgba(14, 14, 16, 0.08);
    text-align: center;
    box-shadow: 0 1px 0 rgba(14,14,16,0.04);
  }

  .hero__eyebrow{
    display: inline-flex; align-items: center; gap: 14px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 0;
    margin-bottom: clamp(18px, 2.6vh, 30px);
  }
  .hero__eyebrow-dash{
    width: 22px; height: 1px;
    background: var(--ink);
  }
  .hero__eyebrow-static{ white-space: nowrap; }
  .hero__eyebrow-sep{
    opacity: 0.4;
    margin: 0 -4px;
  }
  /* Rotator: each word occupies the same grid cell, so the container
     auto-sizes to the widest word and nothing gets clipped. */
  .hero__eyebrow-rotator{
    display: inline-grid;
    grid-template-areas: "rot";
    vertical-align: middle;
    line-height: 1;
    text-align: left;
  }
  .hero__eyebrow-word{
    grid-area: rot;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(0.55em);
    transition: opacity .45s cubic-bezier(.2,.7,.2,1), transform .55s cubic-bezier(.2,.7,.2,1);
    color: var(--ink);
  }
  .hero__eyebrow-word.is-active{
    opacity: 1;
    transform: translateY(0);
  }

  .hero__title{
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(48px, 8.8vw, 132px);
    line-height: 0.88;
    letter-spacing: -0.05em;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    gap: clamp(2px, 0.3vw, 6px);
    margin-bottom: clamp(20px, 3vh, 32px);
  }
  .hero__title-l1{
    font-weight: 900;
    letter-spacing: -0.055em;
  }
  .hero__title-l2{
    font-weight: 300;
    font-style: italic;
    font-size: 0.82em;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.28em;
    position: relative;
  }
  .hero__title-l2 em{
    font-style: italic;
    font-weight: 300;
    position: relative;
    z-index: 1;
  }
  .hero__title-accent{
    position: absolute;
    inset: 14% -2% 22% -2%;
    z-index: 0;
    background: var(--accent);
    transform: skewX(-6deg);
    animation: accentSwipe 5s cubic-bezier(.5,.2,.2,1) infinite;
  }
  @keyframes accentSwipe {
    0%, 100% { transform: skewX(-6deg) scaleX(1); transform-origin: left; }
    50% { transform: skewX(-6deg) scaleX(1.04); transform-origin: left; }
  }
  .hero__title-l3{
    font-weight: 900;
    letter-spacing: -0.055em;
  }

  .hero__sub{
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(15px, 1.25vw, 18px);
    line-height: 1.5;
    color: var(--ink-soft);
    max-width: 56ch;
    margin: 0 auto clamp(22px, 3vh, 36px);
  }

  .hero__cta{
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  }

  /* --- Marquee (back plane) --- */
  .hero-marquee{
    overflow: hidden;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--ink);
    color: var(--paper);
    padding: 14px 0;
    z-index: 2;
    position: relative;
  }
  .hero-marquee__track{
    display: flex;
    gap: 48px;
    width: max-content;
    animation: marquee 36s linear infinite;
    white-space: nowrap;
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(15px, 1.4vw, 22px);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .hero-marquee__item{
    display: inline-flex; align-items: center; gap: 14px;
  }
  .hero-marquee__dot{
    color: var(--accent);
    font-size: 0.7em;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* Corners */
  .hero__corner{
    position: absolute;
    z-index: 5;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hero__corner--bl{
    left: clamp(20px, 4vw, 56px);
    bottom: clamp(72px, 9vh, 110px);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
  }
  .hero__corner-arrow{
    animation: bobDown 2s ease-in-out infinite;
  }
  @keyframes bobDown {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }

  /* ========================================================= */
  /* ===========         SECTION BASE            ============= */
  /* ========================================================= */
  .bloc{
    padding: clamp(80px, 12vh, 160px) 0;
    position: relative;
  }
  .bloc--dark{
    background: var(--ink);
    color: var(--paper);
  }

  /* ========================================================= */
  /* ===========          MANIFESTO              ============= */
  /* ========================================================= */
  .manif__grid{
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: clamp(60px, 8vw, 120px);
    align-items: end;
  }
  @media (max-width: 880px){ .manif__grid{ grid-template-columns: 1fr; gap: 60px; } }

  .manif__text h2{ margin-bottom: 28px; }

  .manif__stats{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }
  .stat{
    background: var(--bg-alt);
    padding: 28px 24px;
    border-left: 3px solid var(--accent);
    transition: background .25s;
  }
  .stat:hover{ background: var(--paper); }
  .stat__n{
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(36px, 4vw, 56px);
    letter-spacing: -0.035em;
    line-height: 1;
    color: var(--ink);
  }
  .stat__label{
    margin-top: 12px;
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .stat__src{
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ========================================================= */
  /* ===========           FORMATS               ============= */
  /* ========================================================= */
  .formats__head{
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: clamp(40px, 6vw, 90px);
    align-items: end;
    margin-bottom: 72px;
  }
  @media (max-width: 880px){ .formats__head{ grid-template-columns: 1fr; } }

  .formats__lede{
    font-size: clamp(15px, 1.2vw, 17px);
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 48ch;
  }

  .formats__table{
    border-top: 2px solid var(--ink);
  }
  .fmt-row{
    display: grid;
    grid-template-columns: 80px 1fr 60px;
    gap: 24px;
    padding: 36px 0;
    border-bottom: 1px solid var(--line);
    align-items: start;
    transition: padding-left .35s cubic-bezier(.2,.7,.2,1), background .25s;
    cursor: pointer;
  }
  .fmt-row.is-hover{
    padding-left: 24px;
    background: linear-gradient(to right, var(--bg-alt) 0%, transparent 100%);
  }
  .fmt-row__id{
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-mute);
    letter-spacing: 0.08em;
    padding-top: 8px;
  }
  .fmt-row__top{
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 16px 24px;
    margin-bottom: 12px;
  }
  .fmt-row__name{
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(24px, 2.4vw, 38px);
    letter-spacing: -0.025em;
    color: var(--ink);
    line-height: 1.05;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .fmt-row__pin{
    display: inline-flex;
    align-items: center;
    padding: 5px 9px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .fmt-row__meta{
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .fmt-row__meta .dot{ color: var(--ink-faint); }
  .fmt-row__desc{
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 68ch;
  }
  .fmt-row__arrow{
    font-family: var(--mono);
    font-size: 28px;
    color: var(--ink-faint);
    text-align: right;
    padding-top: 8px;
    transition: color .25s, transform .25s;
  }
  .fmt-row.is-hover .fmt-row__arrow{ transform: translateX(8px); }

  /* ========================================================= */
  /* ===========             COACH               ============= */
  /* ========================================================= */
  .coach__grid{
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: clamp(40px, 6vw, 90px);
    align-items: stretch;
  }
  @media (max-width: 880px){ .coach__grid{ grid-template-columns: 1fr; } }

  .coach__media-wrap{
    position: relative;
    /* No overflow:hidden — lets the EREPS badge stick out beyond the photo. */
  }
  .coach__media{
    position: relative;
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: #1A1A1D;
  }
  .coach__img{
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(1) contrast(1.05);
  }
  .coach__media-tag{
    position: absolute;
    top: 18px; right: 18px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
  }

  /* EREPS certification badge — sits in the gutter to the right of the
     portrait, half-overlapping the photo edge. Keeps Hughes' face / chest
     unobstructed. */
  .coach__ereps{
    position: absolute;
    top: 50%;
    right: 0;
    width: clamp(86px, 8.5vw, 116px);
    aspect-ratio: 1 / 1;
    background: var(--paper);
    border-radius: 50%;
    padding: 6px;
    box-shadow: 0 10px 32px rgba(0,0,0,.45);
    z-index: 4;
    transform: translate(58%, -50%) rotate(-8deg);
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .coach__ereps:hover{ transform: translate(58%, -50%) rotate(0deg) scale(1.05); }
  .coach__ereps img{
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .coach__media-meta{
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, rgba(14,14,16,.92) 30%, transparent 100%);
    padding: 40px 24px 22px;
    display: flex;
    justify-content: space-between;
    color: var(--paper);
  }
  .coach__media-meta .mono-label{
    color: rgba(250,250,250,.6);
    margin-bottom: 4px;
  }
  .coach__media-name{
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    color: var(--paper);
  }

  .coach__text{
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .coach__text h2{ margin-bottom: 36px; }

  .coach__quote{
    font-family: var(--display);
    font-weight: 400;
    font-style: italic;
    font-size: clamp(18px, 1.6vw, 22px);
    line-height: 1.45;
    color: rgba(250,250,250,.85);
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 24px;
    margin-bottom: 44px;
    max-width: 48ch;
  }

  .coach__creds{
    list-style: none;
    border-top: 1px solid rgba(250,250,250,.18);
  }
  .coach__creds li{
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 24px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(250,250,250,.18);
    align-items: baseline;
    font-size: 15px;
    color: rgba(250,250,250,.85);
    line-height: 1.5;
  }
  .coach__creds li > span:last-child{
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .coach__creds strong{
    color: var(--paper);
    font-weight: 600;
  }
  .coach__creds-sub{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: rgba(250,250,250,.5);
  }
  .coach__creds .mono-label{
    color: var(--accent);
    margin: 0;
    font-size: 10.5px;
  }

  /* ========================================================= */
  /* ===========          PROCESS                ============= */
  /* ========================================================= */
  .process__title{ margin-bottom: 80px; max-width: 22ch; }
  .process__grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    position: relative;
  }
  @media (max-width: 880px){ .process__grid{ grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px){ .process__grid{ grid-template-columns: 1fr; } }

  .step{
    background: var(--bg-alt);
    padding: 36px 28px 36px;
    min-height: 280px;
    position: relative;
    display: flex;
    flex-direction: column;
    transition: background .25s;
  }
  .step:hover{ background: var(--paper); }
  .step__head{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .step__n{
    font-family: var(--display);
    font-weight: 900;
    font-size: 28px;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .step__dot{
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
  }
  .step__title{
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(24px, 2.2vw, 30px);
    letter-spacing: -0.025em;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .step__sub{
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 20px;
  }
  .step__body{
    font-size: 14.5px;
    color: var(--ink-soft);
    line-height: 1.55;
  }
  .step__connector{
    position: absolute;
    right: -14px; top: 44px;
    background: var(--bg);
    color: var(--ink-faint);
    width: 28px; height: 28px;
    display: grid; place-items: center;
    font-family: var(--mono);
    z-index: 2;
    border: 1px solid var(--line);
  }
  @media (max-width: 880px){
    .step__connector{ display: none; }
  }

  /* ========================================================= */
  /* ===========             PROOF               ============= */
  /* ========================================================= */
  .bloc--proof{ padding: clamp(40px, 6vh, 70px) 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: var(--bg-alt);}
  .proof__head{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
  }
  .proof__count{
    font-family: var(--display);
    font-weight: 900;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--ink-mute);
  }
  .proof__grid{
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 1px;
    background: var(--line-soft);
    border: 1px solid var(--line-soft);
  }
  @media (max-width: 880px){ .proof__grid{ grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 560px){ .proof__grid{ grid-template-columns: repeat(2, 1fr); } }
  .proof__cell{
    background: var(--bg-alt);
    padding: 28px 16px;
    min-height: 96px;
    display: grid;
    place-items: center;
    position: relative;
    transition: background .25s;
  }
  .proof__cell:hover{ background: var(--paper); }
  .proof__name{
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.005em;
    color: var(--ink-soft);
    text-align: center;
    transition: color .25s;
  }
  .proof__cell:hover .proof__name{ color: var(--ink); }

  /* ========================================================= */
  /* ===========           CONTACT               ============= */
  /* ========================================================= */
  .bloc--contact{ padding: clamp(80px, 14vh, 160px) 0 60px;}
  .contact__grid{
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: clamp(40px, 6vw, 100px);
    align-items: start;
  }
  @media (max-width: 980px){ .contact__grid{ grid-template-columns: 1fr; } }

  .contact__lede{
    font-size: clamp(15px, 1.2vw, 18px);
    color: rgba(250,250,250,.72);
    max-width: 50ch;
    line-height: 1.6;
    margin: 36px 0 56px;
  }
  .contact__meta{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px 36px;
    border-top: 1px solid rgba(250,250,250,.18);
    padding-top: 32px;
  }
  .contact__meta > div{ display: flex; flex-direction: column; gap: 8px; }
  .contact__meta .mono-label{ color: rgba(250,250,250,.5); margin: 0; }
  .contact__meta a, .contact__meta span:last-child{
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(15px, 1.2vw, 17px);
    color: var(--paper);
    transition: color .2s;
  }
  .contact__meta a:hover{ color: var(--accent); }

  /* Form */
  .contact__form{
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(250,250,250,.14);
    padding: clamp(28px, 3vw, 40px);
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .field{ display: flex; flex-direction: column; gap: 8px; }
  .field label{
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(250,250,250,.55);
  }
  .field input, .field select, .field textarea{
    font-family: var(--sans);
    font-size: 15px;
    background: transparent;
    border: 0;
    border-bottom: 1px solid rgba(250,250,250,.22);
    color: var(--paper);
    padding: 10px 0;
    outline: none;
    transition: border-color .25s;
  }
  .field input::placeholder, .field textarea::placeholder{ color: rgba(250,250,250,.32); }
  .field input:focus, .field select:focus, .field textarea:focus{
    border-bottom-color: var(--accent);
  }
  .field select{ appearance: none; background-image: linear-gradient(45deg, transparent 50%, rgba(250,250,250,.6) 50%), linear-gradient(135deg, rgba(250,250,250,.6) 50%, transparent 50%); background-position: calc(100% - 12px) 18px, calc(100% - 6px) 18px; background-size: 6px 6px; background-repeat: no-repeat; }
  .field select option{ background: var(--ink); color: var(--paper);}
  .field textarea{ resize: vertical; min-height: 80px; border: 1px solid rgba(250,250,250,.22); padding: 12px 14px; }
  .field textarea:focus{ border-color: var(--accent); }
  .field-row{ display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 560px){ .field-row{ grid-template-columns: 1fr; } }

  /* Footer */
  .footer{
    margin-top: clamp(60px, 9vh, 100px);
    padding: 28px 0;
    border-top: 1px solid rgba(250,250,250,.18);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 24px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(250,250,250,.5);
  }
  .footer__left{ display: flex; align-items: center; gap: 16px; }
  .footer__logo{ width: 44px; height: 44px; object-fit: contain; }
  .footer__brand{
    font-family: var(--display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--paper);
  }
  .footer__sub{
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    color: rgba(250,250,250,.5);
    margin-top: 3px;
  }
  .footer__right{ display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .footer__right a:hover{ color: var(--paper); }

  /* ========================================================= */
  /* ===========          RESPONSIVE              ============= */
  /* ========================================================= */

  /* ---------- Tablet ---------- */
  @media (max-width: 980px){
    .display-xl{ font-size: clamp(40px, 7vw, 78px); }
    .display-xxl{ font-size: clamp(48px, 10vw, 120px); }
    .formats__head{ grid-template-columns: 1fr; gap: 24px; }
    .formats__head h2{ margin-top: 8px; }
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 720px){
    :root{ --pad: 18px; }
    .wrap{ padding: 0 var(--pad); }
    .bloc{ padding: 64px 0; }

    /* ===== HERO ===== */
    /* Mobile hero: drop the editorial tile grid (too "Lego" at this width).
       Use ONE full-bleed photo as a backdrop, a small yellow accent stamp,
       and let the title card carry the message. */
    .hero__inner{
      padding: 14px;
      gap: 12px;
      min-height: auto;
    }
    .hero__topbar{ gap: 10px; }
    .hero__chip{ font-size: 9.5px; padding: 6px 10px; letter-spacing: 0.10em; }
    .hero__chip--ghost{ display: none; }
    .hero__topbar-right{ gap: 12px; }
    .hero__topbar-right a:not(.hero__cta-inline){ display: none; }
    .hero__cta-inline{ padding: 6px 10px; font-size: 10px; }

    /* Collapse the grid to ONE cell; hide all tiles except the first photo
       and the accent (which we re-anchor as a corner stamp). */
    .hero__grid{
      grid-template-columns: 1fr !important;
      grid-template-rows: 1fr !important;
      min-height: 62vh;
      gap: 0;
      position: relative;
    }
    .hero-tile{
      display: none !important;
      grid-column: auto !important;
      grid-row: auto !important;
    }
    /* 3rd child = first photo (ph-1) → backdrop */
    .hero__grid > .hero-tile:nth-child(3){
      display: block !important;
      position: relative;
    }
    .hero__grid > .hero-tile:nth-child(3) .hero-tile__crosshair{ display: none; }

    /* 4th child = accent → small floating stamp in the top-right corner */
    .hero__grid > .hero-tile:nth-child(4){
      display: flex !important;
      position: absolute !important;
      top: 14px;
      right: 14px;
      width: 78px;
      height: 78px;
      z-index: 3;
      box-shadow: 0 8px 24px rgba(14,14,16,.28);
    }
    .hero__grid > .hero-tile:nth-child(4) .hero-tile__accent-inner{
      padding: 10px;
    }
    .hero__grid > .hero-tile:nth-child(4) .hero-tile__accent-num{ font-size: 28px; }
    .hero__grid > .hero-tile:nth-child(4) .hero-tile__accent-label{ font-size: 8px; letter-spacing: 0.10em; }

    /* Soft fade over the photo so the title reads cleanly */
    .hero__grid::before{
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(244,244,245,0) 0%, rgba(244,244,245,0.18) 35%, rgba(244,244,245,0.42) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Horizontal scan line — a thin accent bar that sweeps down the photo
       every ~7 seconds, like a vital-signs / radar tick. */
    .hero__grid::after{
      content: "";
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 24px var(--accent), 0 0 6px var(--accent);
      top: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      animation: heroScan 7s cubic-bezier(.65,.05,.36,1) infinite;
    }
    @keyframes heroScan {
      0%, 5% { top: 0%; opacity: 0; }
      8%     { top: 0%; opacity: 0.9; }
      92%    { top: 100%; opacity: 0.9; }
      96%, 100% { top: 100%; opacity: 0; }
    }

    /* Title card */
    .hero__overlay{ padding: 14px; place-items: end center; }
    .hero__card{
      max-width: 100%;
      padding: 22px 20px 24px;
      backdrop-filter: blur(14px);
      background: rgba(244, 244, 245, 0.82);
    }
    .hero__eyebrow{
      font-size: 9.5px;
      gap: 10px;
      letter-spacing: 0.16em;
      margin-bottom: 14px;
    }
    .hero__eyebrow-dash{ width: 14px; }
    .hero__title{ font-size: clamp(40px, 13vw, 64px); }
    .hero__sub{
      font-size: 13px;
      max-width: 100%;
      line-height: 1.45;
      margin-bottom: 18px;
    }
    .hero__cta{
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      width: 100%;
    }
    .hero__cta .btn{
      justify-content: center;
      padding: 14px 18px;
      font-size: 12px;
    }
    .hero__corner--bl{ display: none; }

    /* Marquee */
    .hero-marquee{ padding: 10px 0; }
    .hero-marquee__track{ font-size: 13px; gap: 32px; }

    /* ===== MANIFESTO ===== */
    .manif__grid{ gap: 36px; }
    .manif__stats{ grid-template-columns: 1fr; }
    .stat{ padding: 22px 20px; }
    .stat__n{ font-size: 36px; }

    /* ===== FORMATS ===== */
    .formats__head{ margin-bottom: 44px; }
    .formats__lede{ font-size: 14px; }
    .fmt-row{
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 22px 0;
    }
    .fmt-row.is-hover{
      padding-left: 0;
      background: none;
    }
    .fmt-row__id{
      font-size: 11px;
      padding-top: 0;
    }
    .fmt-row__top{
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .fmt-row__name{
      font-size: 22px;
      gap: 10px;
    }
    .fmt-row__pin{ font-size: 9px; padding: 4px 8px; letter-spacing: 0.10em; }
    .fmt-row__meta{ font-size: 10px; letter-spacing: 0.06em; }
    .fmt-row__desc{ font-size: 13.5px; }
    .fmt-row__arrow{ display: none; }

    /* ===== COACH ===== */
    .coach__grid{ gap: 32px; }
    .coach__media-wrap{ max-width: 420px; margin: 0 auto; width: 100%; }
    .coach__media-tag{ top: 12px; right: 12px; padding: 6px 10px; font-size: 10px; }
    .coach__media-meta{ padding: 32px 18px 16px; }
    .coach__media-name{ font-size: 15px; }
    /* EREPS badge on mobile: DÉTOURÉE — drop the paper background entirely,
       the turquoise circle of the logo IS the badge. Soft drop-shadow keeps
       it readable on the photo. */
    .coach__ereps{
      top: 14px;
      left: 14px;
      right: auto;
      bottom: auto;
      width: 92px;
      background: transparent;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      transform: rotate(-4deg) !important;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.55));
    }
    .coach__ereps:hover{ transform: rotate(0deg) scale(1.05) !important; }
    .coach__quote{
      font-size: 17px;
      padding-left: 16px;
      margin-bottom: 32px;
    }
    .coach__creds li{
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 16px 0;
    }

    /* ===== PROCESS ===== */
    .process__title{ margin-bottom: 48px; }
    .process__grid{ grid-template-columns: 1fr; }
    .step{ min-height: auto; padding: 28px 22px; }
    .step__connector{ display: none; }
    .step__title{ font-size: 22px; }

    /* ===== PROOF ===== */
    .proof__head{ flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 18px; }
    .proof__grid{ grid-template-columns: repeat(2, 1fr); }
    .proof__cell{ padding: 22px 12px; min-height: 78px; }
    .proof__name{ font-size: 14px; }

    /* ===== CONTACT ===== */
    .bloc--contact{ padding: 60px 0 32px; }
    .contact__grid{ gap: 36px; }
    .contact__lede{ font-size: 14px; margin: 24px 0 32px; }
    .contact__meta{ grid-template-columns: 1fr 1fr; gap: 22px 20px; padding-top: 24px; }
    .contact__meta a, .contact__meta span:last-child{ font-size: 14px; }
    .contact__form{ padding: 22px 20px; gap: 18px; }
    .field-row{ grid-template-columns: 1fr; gap: 18px; }
    .field input, .field select, .field textarea{ font-size: 14px; }
    .btn--lg{ padding: 16px 22px; font-size: 12.5px; }

    /* ===== FOOTER ===== */
    .footer{
      margin-top: 48px;
      padding: 22px 0;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }
    .footer__logo{ width: 38px; height: 38px; }
    .footer__brand{ font-size: 13px; }
    .footer__right{ font-size: 10px; gap: 10px; }
  }

  /* ---------- Very small ---------- */
  @media (max-width: 380px){
    .hero__topbar-right{ gap: 8px; }
    .hero__chip{ font-size: 8.5px; }
    .hero__title{ font-size: clamp(30px, 10vw, 44px); }
    .display-xl{ font-size: clamp(28px, 10vw, 44px); }
    .display-xxl{ font-size: clamp(36px, 13vw, 56px); }
    .contact__meta{ grid-template-columns: 1fr; }
    .proof__grid{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
