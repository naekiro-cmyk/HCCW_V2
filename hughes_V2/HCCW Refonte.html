<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light only" />
<title>HC Corporate Wellness — Coaching sportif en entreprise</title>
<meta name="description" content="Bootcamps, team building et coaching sportif en entreprise. Pour des équipes plus énergiques, plus soudées, et qui transpirent ensemble." />
<link rel="icon" type="image/png" href="assets/hc-favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&family=DM+Sans:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    color-scheme: light only;
    --bg:        #F4F4F5;
    --bg-alt:    #FFFFFF;
    --bg-deep:   #E9E9EB;
    --ink:       #0E0E10;
    --ink-soft:  #3F3F46;
    --ink-mute:  #71717A;
    --ink-faint: #A1A1AA;
    --line:      #D4D4D8;
    --line-soft: #E4E4E7;
    --paper:     #FAFAFA;
    --accent:    #FDD947;
    --display: 'Archivo', system-ui, sans-serif;
    --sans:    'DM Sans', system-ui, sans-serif;
    --mono:    'JetBrains Mono', ui-monospace, monospace;
    --max:   1480px;
    --pad:   clamp(20px, 4vw, 56px);
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{
    scroll-behavior:smooth;
    background: var(--bg);
    color: var(--ink);
    color-scheme: light;
    scroll-padding-top: var(--header-h, 64px);
  }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  @media (prefers-color-scheme: dark){
    html, body{ background: #F4F4F5 !important; color: #0E0E10 !important; }
  }

  a{color:inherit; text-decoration:none;}
  img{max-width:100%; display:block;}
  button{font: inherit; cursor: pointer;}

  ::selection{ background: var(--ink); color: var(--paper); }

  .wrap{ max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); position:relative;}

  /* ========================================================= */
  /* ===========         SITE HEADER             ============= */
  /* ========================================================= */
  :root{
    --header-h: 64px;
  }
  body{ padding-top: var(--header-h); }

  .site-header{
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 60;
    height: var(--header-h);
    background: rgba(14, 14, 16, 0.78);
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
    border-bottom: 1px solid transparent;
    transition: background .25s ease, border-color .25s ease, height .25s ease;
    color: var(--paper);
  }
  .site-header.is-scrolled{
    background: rgba(14, 14, 16, 0.94);
    border-bottom-color: rgba(250, 250, 250, 0.12);
    height: 56px;
  }
  .site-header__inner{
    max-width: var(--max);
    margin: 0 auto;
    height: 100%;
    padding: 0 var(--pad);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .site-header__brand{
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--paper);
    flex-shrink: 0;
  }
  .site-header__logo{
    width: 36px;
    height: 36px;
    background: transparent;
    display: grid;
    place-items: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .site-header__logo img{
    width: 100%;
    height: 100%;
    object-fit: contain;
    mix-blend-mode: screen;
    display: block;
  }
  .site-header__name{
    font-family: var(--display);
    font-weight: 800;
    font-size: 15px;
    letter-spacing: -0.015em;
    line-height: 1;
    color: var(--paper);
    white-space: nowrap;
  }

  .site-header__nav{
    display: flex;
    align-items: center;
    gap: 36px;
    margin-left: auto;
    margin-right: 24px;
  }
  .site-header__nav a{
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(250, 250, 250, 0.62);
    transition: color .2s;
    position: relative;
    text-decoration: none;
  }
  .site-header__nav a::after{
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -6px;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .25s ease;
  }
  .site-header__nav a:hover{ color: var(--paper); }
  .site-header__nav a:hover::after{ transform: scaleX(1); }

  .site-header__cta{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    transition: transform .2s, filter .25s;
    flex-shrink: 0;
  }
  .site-header__cta:hover{ filter: brightness(0.95); }
  .site-header__cta-arrow{
    transition: transform .25s;
    font-family: var(--mono);
  }
  .site-header__cta:hover .site-header__cta-arrow{ transform: translateX(3px); }

  /* Burger button — desktop hidden, mobile visible */
  .site-header__burger{
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    background: transparent;
    border: 1px solid rgba(250, 250, 250, 0.22);
    padding: 0 8px;
    cursor: pointer;
  }
  .site-header__burger span{
    display: block;
    width: 100%;
    height: 1.5px;
    background: var(--paper);
    transition: transform .25s, opacity .25s;
  }
  .site-header__burger.is-open span:nth-child(1){ transform: translateY(7px) rotate(45deg); }
  .site-header__burger.is-open span:nth-child(2){ opacity: 0; }
  .site-header__burger.is-open span:nth-child(3){ transform: translateY(-6px) rotate(-45deg); }

  /* Mobile drawer */
  .site-header__drawer{
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: rgba(14, 14, 16, 0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(250, 250, 250, 0.12);
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s cubic-bezier(.2,.7,.2,1);
  }
  .site-header__drawer.is-open{
    max-height: 400px;
  }
  .site-header__drawer-nav{
    display: flex;
    flex-direction: column;
    padding: 8px var(--pad) 18px;
    gap: 0;
  }
  .site-header__drawer-nav a{
    display: block;
    padding: 16px 0;
    border-bottom: 1px solid rgba(250, 250, 250, 0.12);
    font-family: var(--display);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: -0.015em;
    color: var(--paper);
    text-decoration: none;
  }
  .site-header__drawer-cta{
    margin-top: 14px;
    padding: 16px 18px;
    text-align: center;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    border: 0 !important;
  }

  @media (max-width: 880px){
    .site-header__nav{ display: none; }
    .site-header__cta{ display: none; }
    .site-header__burger{ display: flex; }
    .site-header__name{ font-size: 14px; }
  }
  @media (max-width: 380px){
    .site-header__name{ display: none; }
  }

  /* ========================================================= */
  /* ===========         TYPOGRAPHY SYSTEM        ============= */
  /* ========================================================= */

  .mono-label{
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-mute);
    display: block;
  }

  .h-eyebrow{
    display: inline-flex; align-items: center; gap: 14px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 36px;
  }
  .h-eyebrow__num{ color: var(--ink); font-weight: 600; }
  .h-eyebrow__dash{ height: 1px; flex: 0 0 36px; background: var(--ink-soft); }
  .h-eyebrow--inv{ color: rgba(250,250,250,.55); }
  .h-eyebrow--inv .h-eyebrow__num{ color: var(--paper); }
  .h-eyebrow--inv .h-eyebrow__dash{ background: rgba(250,250,250,.4); }

  .display-xl{
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(40px, 6.4vw, 96px);
    line-height: 0.92;
    letter-spacing: -0.045em;
    color: var(--ink);
    text-wrap: balance;
  }
  .display-xl em{ font-style: italic; font-weight: 500; }
  .display-xl__heavy{ font-weight: 900; }
  .display-xl--inv{ color: var(--paper); }

  .display-xxl{
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(56px, 9vw, 156px);
    line-height: 0.88;
    letter-spacing: -0.05em;
    color: var(--paper);
    text-wrap: balance;
  }
  .display-xxl em{ font-weight: 700; font-style: italic; }

  .lede{
    font-family: var(--sans);
    font-size: clamp(16px, 1.3vw, 19px);
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 52ch;
  }
  .lede strong{ color: var(--ink); font-weight: 600; }

  /* ========================================================= */
  /* ===========           BUTTONS               ============= */
  /* ========================================================= */
  .btn{
    display: inline-flex; align-items: center; gap: 14px;
    padding: 16px 22px;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background .25s, color .25s, border-color .25s, transform .25s;
    cursor: pointer;
    text-decoration: none;
  }
  .btn:hover{ background: var(--ink); color: var(--paper); }
  .btn--solid{ background: var(--ink); color: var(--paper); }
  .btn--solid:hover{ background: var(--accent); color: var(--ink); border-color: var(--accent); }
  .btn--ghost{ background: rgba(255,255,255,.85); backdrop-filter: blur(8px); border-color: var(--ink); }
  .btn--ghost:hover{ background: var(--ink); color: var(--paper); }
  .btn--lg{ padding: 22px 30px; font-size: 14px;}
  .btn__arrow{ display: inline-block; transition: transform .3s; font-family: var(--mono); }
  .btn:hover .btn__arrow{ transform: translateX(4px); }

  /* ========================================================= */
  /* ===========          REVEAL                 ============= */
  /* ========================================================= */
  .reveal{ opacity: 0; transform: translateY(28px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.is-in{ opacity: 1; transform: none; }

  /* ========================================================= */
  /* ===========             HERO                ============= */
  /* ========================================================= */
  .hero{
    position: relative;
    background: var(--bg);
    padding: 0;
    border-bottom: 1px solid var(--line);
  }
  .hero__inner{
    position: relative;
    min-height: calc(100vh - var(--header-h));
    min-height: calc(100dvh - var(--header-h));
    padding: clamp(16px, 1.6vw, 22px);
    display: grid;
    grid-template-rows: 1fr auto;
    gap: clamp(16px, 1.6vw, 22px);
  }

  /* --- Top bar --- */
  .hero__topbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 4px;
    z-index: 5;
  }
  .hero__topbar-left{ display: flex; gap: 10px; align-items: center; flex-wrap: wrap;}
  .hero__chip{
    display: inline-flex; align-items: center;
    padding: 7px 12px;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .hero__chip--ghost{
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
  }
  .hero__topbar-right{
    display: flex; align-items: center; gap: 28px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .hero__topbar-right a{
    color: var(--ink-soft);
    transition: color .2s;
    position: relative;
  }
  .hero__topbar-right a:hover{ color: var(--ink); }
  .hero__cta-inline{
    color: var(--ink) !important;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 12px;
    background: var(--accent);
    transition: transform .2s !important;
  }
  .hero__cta-inline:hover{ transform: translateX(2px); }

  /* --- Stage holds layered planes + the title overlay ---
     Each plane is absolutely positioned with its own elevation. Real shadows
     + differential parallax (in JS) sell the depth. No more grid tiles. */
  .hero__stage{
    position: relative;
    z-index: 1;
    min-height: 0;
    isolation: isolate;
    background: var(--bg);
  }
  .hero__stage::before{
    /* Subtle hairline grid that fades to the centre — just enough texture
       to anchor the planes against. */
    content: "";
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: clamp(48px, 5vw, 96px) clamp(48px, 5vw, 96px);
    background-position: 0 0;
    opacity: 0.6;
    -webkit-mask-image: radial-gradient(ellipse at center, black 25%, transparent 78%);
            mask-image: radial-gradient(ellipse at center, black 25%, transparent 78%);
  }

  .hero__plane{
    position: absolute;
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
    will-change: transform;
  }

  /* Plane 1 — photo block. Top-left anchor, deepest shadow that bleeds
     down-right toward the yellow. */
  .hero__plane--photo{
    z-index: 1;
    top: clamp(20px, 4vh, 56px);
    left: clamp(20px, 4vw, 64px);
    width: clamp(56%, 60%, 64%);
    height: clamp(64%, 70%, 76%);
    overflow: hidden;
    background: #1A1A1D;
    box-shadow:
      0 30px 60px -22px rgba(14,14,16,0.42),
      0 10px 24px -10px rgba(14,14,16,0.22),
      0 1px 0 rgba(14,14,16,0.08);
  }
  .hero__plane--photo .hero-photo{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(1) contrast(1.05);
    transition: opacity 1.2s ease, transform 7s ease-out;
  }
  .hero__plane-photo-tag{
    position: absolute;
    top: 18px;
    left: 18px;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 11px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--paper);
    background: rgba(14,14,16,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .hero__plane-photo-tag-sep{ opacity: 0.5; }
  .hero__plane-photo-crosshair{
    position: absolute;
    top: 12px; right: 12px;
    width: 18px; height: 18px;
    border-top: 1.5px solid var(--accent);
    border-right: 1.5px solid var(--accent);
    z-index: 2;
  }

  /* Plane 2 — yellow slab. Bottom-right anchor, sits over the photo's
     bottom-right corner. Slightly less shadow than the photo so the photo
     reads as just-behind. */
  .hero__plane--yellow{
    z-index: 2;
    bottom: clamp(20px, 4vh, 56px);
    right: clamp(20px, 4vw, 64px);
    width: clamp(42%, 46%, 50%);
    height: clamp(50%, 56%, 62%);
    box-shadow:
      0 36px 70px -24px rgba(14,14,16,0.36),
      0 12px 26px -10px rgba(14,14,16,0.20);
    padding: clamp(20px, 2.4vw, 36px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .hero__plane--yellow::after{
    /* Hairline grid texture that gives the yellow a sense of surface —
       it stops being a flat block, starts being a printed sheet. */
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(0deg, rgba(14,14,16,0.06) 0 1px, transparent 1px 14px);
    opacity: 0.6;
  }
  .hero__plane-yellow-label{
    font-family: var(--mono);
    font-size: clamp(11px, 0.85vw, 13px);
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink);
    align-self: flex-start;
    position: relative;
    z-index: 2;
  }
  .hero__plane-yellow-plus{
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(80px, 11vw, 180px);
    line-height: 0.78;
    letter-spacing: -0.06em;
    color: var(--ink);
    align-self: flex-end;
    position: relative;
    z-index: 2;
  }

  /* Plane 4 — fine print top-right. Sits above everything but is so light
     visually that it just acts as a tag. */
  .hero__finemark{
    position: absolute;
    z-index: 5;
    top: clamp(14px, 2.4vh, 28px);
    right: clamp(20px, 4vw, 64px);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .hero__finemark-sub{
    color: var(--ink-mute);
    font-weight: 500;
  }

  /* --- Title overlay (front) --- */
  .hero__overlay{
    position: absolute;
    inset: 0;
    z-index: 4;
    display: grid;
    place-items: center;
    text-align: center;
    pointer-events: none;
    padding: clamp(20px, 4vw, 60px);
    transition: transform .3s ease-out;
  }
  .hero__overlay > *{ pointer-events: auto; }

  .hero__card{
    position: relative;
    max-width: min(960px, 76%);
    padding: clamp(24px, 3vw, 44px) clamp(28px, 4vw, 56px) clamp(28px, 3vw, 44px);
    background: rgba(244, 244, 245, 0.78);
    backdrop-filter: blur(18px) saturate(1.1);
    -webkit-backdrop-filter: blur(18px) saturate(1.1);
    border: 1px solid rgba(14, 14, 16, 0.10);
    text-align: center;
    /* Deepest elevation — title card is the highest plane. */
    box-shadow:
      0 50px 100px -40px rgba(14, 14, 16, 0.45),
      0 22px 50px -18px rgba(14, 14, 16, 0.22),
      0 1px 0 rgba(14, 14, 16, 0.06);
  }

  .hero__eyebrow{
    display: inline-flex; align-items: center; gap: 14px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 0;
    margin-bottom: clamp(18px, 2.6vh, 30px);
  }
  .hero__eyebrow-dash{
    width: 22px; height: 1px;
    background: var(--ink);
  }
  .hero__eyebrow-static{ white-space: nowrap; }
  .hero__eyebrow-sep{
    opacity: 0.4;
    margin: 0 -4px;
  }
  /* Rotator: each word occupies the same grid cell, so the container
     auto-sizes to the widest word and nothing gets clipped. */
  .hero__eyebrow-rotator{
    display: inline-grid;
    grid-template-areas: "rot";
    vertical-align: middle;
    line-height: 1;
    text-align: left;
  }
  .hero__eyebrow-word{
    grid-area: rot;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(0.55em);
    transition: opacity .45s cubic-bezier(.2,.7,.2,1), transform .55s cubic-bezier(.2,.7,.2,1);
    color: var(--ink);
  }
  .hero__eyebrow-word.is-active{
    opacity: 1;
    transform: translateY(0);
  }

  .hero__title{
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(48px, 8.8vw, 132px);
    line-height: 0.88;
    letter-spacing: -0.05em;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    gap: clamp(2px, 0.3vw, 6px);
    margin-bottom: clamp(20px, 3vh, 32px);
  }
  .hero__title-l1{
    font-weight: 900;
    letter-spacing: -0.055em;
  }
  /* Middle line — holds the rotating verb. Inline-flex so the italic word
     sits centered with its yellow swipe directly beneath it. */
  .hero__title-l2{
    font-weight: 300;
    font-style: italic;
    font-size: 0.82em;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  /* Verb container — single grid cell holds N stacked words so the layout
     width snaps to the widest verb. Each <em> fades and slides through. */
  .hero__title-verb{
    display: inline-grid;
    grid-template-areas: "verb";
    position: relative;
    align-items: center;
    justify-items: center;
    padding: 0 0.18em;
  }
  .hero__title-verb-word{
    grid-area: verb;
    font-style: italic;
    font-weight: 300;
    white-space: nowrap;
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateY(0.5em);
    transition:
      opacity .55s cubic-bezier(.2,.7,.2,1),
      transform .65s cubic-bezier(.2,.7,.2,1);
  }
  .hero__title-verb-word.is-active{
    opacity: 1;
    transform: translateY(0);
    /* Active verb gets a tiny breathing pulse — keeps the eye on it between
       rotations. */
    animation: verbBreath 1.8s ease-in-out infinite;
  }
  @keyframes verbBreath {
    0%, 100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-0.015em) scale(1.012); }
  }
  /* Yellow swipe behind the active verb. key={verbIdx} on the React side
     re-mounts this element on every rotation, so the animation re-fires
     and the bar re-strokes the new word. */
  .hero__title-accent{
    grid-area: verb;
    position: absolute;
    inset: 14% -6% 18% -6%;
    z-index: 0;
    background: var(--accent);
    transform-origin: left center;
    animation: accentSwipeIn .55s cubic-bezier(.7,.05,.25,1) both;
    will-change: transform;
  }
  @keyframes accentSwipeIn {
    0%   { transform: skewX(-6deg) scaleX(0); transform-origin: left center; }
    55%  { transform: skewX(-6deg) scaleX(1.05); transform-origin: left center; }
    70%  { transform: skewX(-6deg) scaleX(1.05); transform-origin: right center; }
    100% { transform: skewX(-6deg) scaleX(1); transform-origin: right center; }
  }
  .hero__title-l3{
    font-weight: 900;
    letter-spacing: -0.055em;
    /* Slight subpixel "settle" — fires once on mount; the period gets the
       accent colour via inline style so it reads as a beat at the end. */
  }
  .hero__title-dot{
    display: inline-block;
    margin-left: 0.02em;
    transform: translateY(-0.04em);
  }

  .hero__sub{
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(15px, 1.25vw, 18px);
    line-height: 1.5;
    color: var(--ink-soft);
    max-width: 56ch;
    margin: 0 auto clamp(22px, 3vh, 36px);
  }

  .hero__cta{
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  }

  /* Three pillars row — short, declarative, sits between the lede and the
     CTAs. Vertical hairline separators tinted with the brand accent. */
  .hero__pillars{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: clamp(14px, 1.6vw, 24px);
    margin: 0 auto clamp(22px, 3vh, 32px);
    padding: clamp(10px, 1.2vh, 16px) clamp(18px, 2vw, 28px);
    border-top: 1px solid rgba(14,14,16,0.10);
    border-bottom: 1px solid rgba(14,14,16,0.10);
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(13px, 1.05vw, 17px);
    letter-spacing: 0.01em;
    color: var(--ink);
    text-transform: none;
    width: fit-content;
    max-width: 100%;
  }
  .hero__pillar{
    white-space: nowrap;
    position: relative;
  }
  .hero__pillar-sep{
    display: inline-block;
    width: 2px;
    height: 1.05em;
    flex-shrink: 0;
    opacity: 0.9;
  }

  /* --- Marquee (back plane) --- */
  .hero-marquee{
    overflow: hidden;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--ink);
    color: var(--paper);
    padding: 14px 0;
    z-index: 2;
    position: relative;
  }
  .hero-marquee__track{
    display: flex;
    gap: 48px;
    width: max-content;
    animation: marquee 36s linear infinite;
    white-space: nowrap;
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(15px, 1.4vw, 22px);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .hero-marquee__item{
    display: inline-flex; align-items: center; gap: 14px;
  }
  .hero-marquee__dot{
    color: var(--accent);
    font-size: 0.7em;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* Corners */
  .hero__corner{
    position: absolute;
    z-index: 5;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hero__corner--bl{
    left: clamp(20px, 4vw, 56px);
    bottom: clamp(72px, 9vh, 110px);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
  }
  .hero__corner-arrow{
    animation: bobDown 2s ease-in-out infinite;
  }
  @keyframes bobDown {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }

  /* ========================================================= */
  /* ===========         SECTION BASE            ============= */
  /* ========================================================= */
  .bloc{
    padding: clamp(80px, 12vh, 160px) 0;
    position: relative;
  }
  .bloc--dark{
    background: var(--ink);
    color: var(--paper);
  }

  /* ========================================================= */
  /* ===========          MANIFESTO              ============= */
  /* ========================================================= */
  .manif__grid{
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: clamp(60px, 8vw, 120px);
    align-items: end;
  }
  @media (max-width: 880px){ .manif__grid{ grid-template-columns: 1fr; gap: 60px; } }

  .manif__text h2{ margin-bottom: 28px; }

  .manif__stats{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }
  .stat{
    background: var(--bg-alt);
    padding: 28px 24px;
    border-left: 3px solid var(--accent);
    transition: background .25s;
  }
  .stat:hover{ background: var(--paper); }
  .stat__n{
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(36px, 4vw, 56px);
    letter-spacing: -0.035em;
    line-height: 1;
    color: var(--ink);
  }
  .stat__label{
    margin-top: 12px;
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .stat__src{
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ========================================================= */
  /* ===========           FORMATS               ============= */
  /* ========================================================= */
  .formats__head{
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: clamp(40px, 6vw, 90px);
    align-items: end;
    margin-bottom: 72px;
  }
  @media (max-width: 880px){ .formats__head{ grid-template-columns: 1fr; } }

  .formats__lede{
    font-size: clamp(15px, 1.2vw, 17px);
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 48ch;
  }

  .formats__table{
    border-top: 2px solid var(--ink);
  }

  /* ----- À noter ----- */
  /* Sits below the format table as its epilogue. Two-column grid mirrors
     the .fmt-row rhythm (tag column on the left, body on the right) so it
     reads as part of the same table, not a separate block. */
  .formats__note{
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 24px;
    padding: 44px 0 8px;
    border-top: 1px solid var(--line);
    margin-top: -1px; /* eat the table's last border so the line continues */
  }
  .formats__note-tag{
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding-top: 6px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .formats__note-tag-bar{
    display: block;
    width: 28px;
    height: 4px;
  }
  .formats__note-body{
    max-width: 68ch;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .formats__note-lead{
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(20px, 2vw, 28px);
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .formats__note-text{
    font-size: 15.5px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .formats__note-text strong{ color: var(--ink); font-weight: 600; }
  .formats__note-cta{
    align-self: flex-start;
    margin-top: 10px;
  }
  @media (max-width: 720px){
    .formats__note{
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 32px 0 4px;
    }
    .formats__note-lead{ font-size: 19px; }
    .formats__note-text{ font-size: 14px; }
  }
  .fmt-row{
    display: grid;
    grid-template-columns: 80px 1fr 60px;
    gap: 24px;
    padding: 36px 0;
    border-bottom: 1px solid var(--line);
    align-items: start;
    transition: padding-left .35s cubic-bezier(.2,.7,.2,1), background .25s;
    cursor: pointer;
  }
  .fmt-row.is-hover{
    padding-left: 24px;
    background: linear-gradient(to right, var(--bg-alt) 0%, transparent 100%);
  }
  .fmt-row__id{
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-mute);
    letter-spacing: 0.08em;
    padding-top: 8px;
  }
  .fmt-row__top{
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 16px 24px;
    margin-bottom: 12px;
  }
  .fmt-row__name{
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(24px, 2.4vw, 38px);
    letter-spacing: -0.025em;
    color: var(--ink);
    line-height: 1.05;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .fmt-row__pin{
    display: inline-flex;
    align-items: center;
    padding: 5px 9px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .fmt-row__meta{
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .fmt-row__meta .dot{ color: var(--ink-faint); }
  .fmt-row__desc{
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 68ch;
  }
  .fmt-row__arrow{
    font-family: var(--mono);
    font-size: 28px;
    color: var(--ink-faint);
    text-align: right;
    padding-top: 8px;
    transition: color .25s, transform .25s;
  }
  .fmt-row.is-hover .fmt-row__arrow{ transform: translateX(8px); }

  /* ========================================================= */
  /* ===========             COACH               ============= */
  /* ========================================================= */
  .coach__grid{
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: clamp(40px, 6vw, 90px);
    align-items: stretch;
  }
  @media (max-width: 880px){ .coach__grid{ grid-template-columns: 1fr; } }

  .coach__media-wrap{
    position: relative;
    /* No overflow:hidden — lets the EREPS badge stick out beyond the photo. */
  }
  .coach__media{
    position: relative;
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: #1A1A1D;
  }
  .coach__img{
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(1) contrast(1.05);
  }
  .coach__media-tag{
    position: absolute;
    top: 18px; right: 18px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
  }

  /* EREPS certification badge — sits in the gutter to the right of the
     portrait, half-overlapping the photo edge. Keeps Hughes' face / chest
     unobstructed. */
  .coach__ereps{
    position: absolute;
    top: 50%;
    right: 0;
    width: clamp(86px, 8.5vw, 116px);
    aspect-ratio: 1 / 1;
    background: var(--paper);
    border-radius: 50%;
    padding: 6px;
    box-shadow: 0 10px 32px rgba(0,0,0,.45);
    z-index: 4;
    transform: translate(58%, -50%) rotate(-8deg);
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .coach__ereps:hover{ transform: translate(58%, -50%) rotate(0deg) scale(1.05); }
  .coach__ereps img{
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .coach__media-meta{
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, rgba(14,14,16,.92) 30%, transparent 100%);
    padding: 40px 24px 22px;
    display: flex;
    justify-content: space-between;
    color: var(--paper);
  }
  .coach__media-meta .mono-label{
    color: rgba(250,250,250,.6);
    margin-bottom: 4px;
  }
  .coach__media-name{
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    color: var(--paper);
  }

  .coach__text{
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .coach__text h2{ margin-bottom: 36px; }

  .coach__quote{
    font-family: var(--display);
    font-weight: 400;
    font-style: italic;
    font-size: clamp(18px, 1.6vw, 22px);
    line-height: 1.45;
    color: rgba(250,250,250,.85);
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 24px;
    margin-bottom: 44px;
    max-width: 48ch;
  }

  .coach__creds{
    list-style: none;
    border-top: 1px solid rgba(250,250,250,.18);
  }
  .coach__creds li{
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 24px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(250,250,250,.18);
    align-items: baseline;
    font-size: 15px;
    color: rgba(250,250,250,.85);
    line-height: 1.5;
  }
  .coach__creds li > span:last-child{
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .coach__creds strong{
    color: var(--paper);
    font-weight: 600;
  }
  .coach__creds-sub{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: rgba(250,250,250,.5);
  }
  .coach__creds .mono-label{
    color: var(--accent);
    margin: 0;
    font-size: 10.5px;
  }

  /* ========================================================= */
  /* ===========          PROCESS                ============= */
  /* ========================================================= */
  .process__title{ margin-bottom: 80px; max-width: 22ch; }
  .process__grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    position: relative;
  }
  @media (max-width: 880px){ .process__grid{ grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px){ .process__grid{ grid-template-columns: 1fr; } }

  .step{
    background: var(--bg-alt);
    padding: 36px 28px 36px;
    min-height: 280px;
    position: relative;
    display: flex;
    flex-direction: column;
    transition: background .25s;
  }
  .step:hover{ background: var(--paper); }
  .step__head{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .step__n{
    font-family: var(--display);
    font-weight: 900;
    font-size: 28px;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .step__dot{
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
  }
  .step__title{
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(24px, 2.2vw, 30px);
    letter-spacing: -0.025em;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .step__sub{
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 20px;
  }
  .step__body{
    font-size: 14.5px;
    color: var(--ink-soft);
    line-height: 1.55;
  }
  .step__connector{
    position: absolute;
    right: -14px; top: 44px;
    background: var(--bg);
    color: var(--ink-faint);
    width: 28px; height: 28px;
    display: grid; place-items: center;
    font-family: var(--mono);
    z-index: 2;
    border: 1px solid var(--line);
  }
  @media (max-width: 880px){
    .step__connector{ display: none; }
  }

  /* ========================================================= */
  /* ===========             PROOF               ============= */
  /* ========================================================= */
  .bloc--proof{ padding: clamp(40px, 6vh, 70px) 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: var(--bg-alt);}
  .proof__head{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
  }
  .proof__count{
    font-family: var(--display);
    font-weight: 900;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--ink-mute);
  }
  .proof__grid{
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 1px;
    background: var(--line-soft);
    border: 1px solid var(--line-soft);
  }
  @media (max-width: 880px){ .proof__grid{ grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 560px){ .proof__grid{ grid-template-columns: repeat(2, 1fr); } }
  .proof__cell{
    background: var(--bg-alt);
    padding: 28px 16px;
    min-height: 96px;
    display: grid;
    place-items: center;
    position: relative;
    transition: background .25s;
  }
  .proof__cell:hover{ background: var(--paper); }
  .proof__name{
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.005em;
    color: var(--ink-soft);
    text-align: center;
    transition: color .25s;
  }
  .proof__cell:hover .proof__name{ color: var(--ink); }

  /* ========================================================= */
  /* ===========           CONTACT               ============= */
  /* ========================================================= */
  .bloc--contact{ padding: clamp(80px, 14vh, 160px) 0 60px;}
  .contact__grid{
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: clamp(40px, 6vw, 100px);
    align-items: start;
  }
  @media (max-width: 980px){ .contact__grid{ grid-template-columns: 1fr; } }

  .contact__lede{
    font-size: clamp(15px, 1.2vw, 18px);
    color: rgba(250,250,250,.72);
    max-width: 50ch;
    line-height: 1.6;
    margin: 36px 0 56px;
  }
  .contact__meta{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px 36px;
    border-top: 1px solid rgba(250,250,250,.18);
    padding-top: 32px;
  }
  .contact__meta > div{ display: flex; flex-direction: column; gap: 8px; }
  .contact__meta .mono-label{ color: rgba(250,250,250,.5); margin: 0; }
  .contact__meta a, .contact__meta span:last-child{
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(15px, 1.2vw, 17px);
    color: var(--paper);
    transition: color .2s;
  }
  .contact__meta a:hover{ color: var(--accent); }

  /* Form */
  .contact__form{
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(250,250,250,.14);
    padding: clamp(28px, 3vw, 40px);
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .field{ display: flex; flex-direction: column; gap: 8px; }
  .field label{
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(250,250,250,.55);
  }
  .field input, .field select, .field textarea{
    font-family: var(--sans);
    font-size: 15px;
    background: transparent;
    border: 0;
    border-bottom: 1px solid rgba(250,250,250,.22);
    color: var(--paper);
    padding: 10px 0;
    outline: none;
    transition: border-color .25s;
  }
  .field input::placeholder, .field textarea::placeholder{ color: rgba(250,250,250,.32); }
  .field input:focus, .field select:focus, .field textarea:focus{
    border-bottom-color: var(--accent);
  }
  .field select{ appearance: none; background-image: linear-gradient(45deg, transparent 50%, rgba(250,250,250,.6) 50%), linear-gradient(135deg, rgba(250,250,250,.6) 50%, transparent 50%); background-position: calc(100% - 12px) 18px, calc(100% - 6px) 18px; background-size: 6px 6px; background-repeat: no-repeat; }
  .field select option{ background: var(--ink); color: var(--paper);}
  .field textarea{ resize: vertical; min-height: 80px; border: 1px solid rgba(250,250,250,.22); padding: 12px 14px; }
  .field textarea:focus{ border-color: var(--accent); }
  .field-row{ display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 560px){ .field-row{ grid-template-columns: 1fr; } }

  /* Footer */
  .footer{
    margin-top: clamp(60px, 9vh, 100px);
    padding: 28px 0;
    border-top: 1px solid rgba(250,250,250,.18);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 24px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(250,250,250,.5);
  }
  .footer__left{ display: flex; align-items: center; gap: 16px; }
  .footer__logo{ width: 44px; height: 44px; object-fit: contain; }
  .footer__brand{
    font-family: var(--display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--paper);
  }
  .footer__sub{
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    color: rgba(250,250,250,.5);
    margin-top: 3px;
  }
  .footer__right{ display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .footer__right a:hover{ color: var(--paper); }

  /* ========================================================= */
  /* ===========          RESPONSIVE              ============= */
  /* ========================================================= */

  /* ---------- Tablet ---------- */
  @media (max-width: 980px){
    .display-xl{ font-size: clamp(40px, 7vw, 78px); }
    .display-xxl{ font-size: clamp(48px, 10vw, 120px); }
    .formats__head{ grid-template-columns: 1fr; gap: 24px; }
    .formats__head h2{ margin-top: 8px; }
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 720px){
    :root{ --pad: 18px; }
    .wrap{ padding: 0 var(--pad); }
    .bloc{ padding: 64px 0; }

    /* ===== HERO ===== */
    /* Mobile hero: KEEP the desktop layered composition, just stack it
       vertically. Photo takes the top, yellow slab overlaps its bottom-right
       corner (same metaphor as desktop), title card sits below as its own
       row instead of floating on top. Fine print stays, smaller. */
    .hero__inner{
      padding: 14px;
      gap: 14px;
      min-height: auto;
    }
    .hero__stage{
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .hero__stage::before{ display: none; }

    /* Photo: top block, ~52vh, holds its own absolute children */
    .hero__plane--photo{
      position: relative !important;
      inset: auto !important;
      top: auto !important;
      left: auto !important;
      width: 100% !important;
      height: 52vh !important;
      box-shadow:
        0 18px 40px -22px rgba(14,14,16,0.42),
        0 6px 14px -8px rgba(14,14,16,0.22);
    }
    .hero__plane-photo-tag{ top: 12px; left: 12px; font-size: 9.5px; padding: 5px 9px; }
    .hero__plane-photo-crosshair{ width: 14px; height: 14px; top: 10px; right: 10px; }

    /* Yellow: anchored to photo's bottom-right (absolute relative to stage),
       overlaps the photo seam exactly like desktop \u2014 1/3 of photo width,
       sitting half-out-of-the-photo at the bottom. */
    .hero__plane--yellow{
      position: absolute !important;
      top: auto !important;
      left: auto !important;
      right: 0 !important;
      /* The photo is 52vh tall; place the slab so it overlaps the bottom 1/3 */
      bottom: calc(100% - 52vh + 24px) !important;
      width: 38% !important;
      height: 18vh !important;
      padding: 14px;
      box-shadow:
        0 14px 28px -10px rgba(14,14,16,0.32),
        0 4px 12px -6px rgba(14,14,16,0.18);
      z-index: 3;
    }
    .hero__plane--yellow::after{
      /* keep the surface texture on mobile too \u2014 it's what sells the plane */
      opacity: 0.5;
    }
    .hero__plane-yellow-plus{ font-size: clamp(54px, 14vw, 76px); line-height: 0.8; }
    .hero__plane-yellow-label{ font-size: 9.5px; letter-spacing: 0.14em; }

    /* Fine print KEPT \u2014 small, above the photo */
    .hero__finemark{
      position: relative !important;
      top: auto !important;
      right: auto !important;
      flex-direction: row;
      align-self: flex-end;
      gap: 10px;
      font-size: 9.5px;
      letter-spacing: 0.14em;
      order: -1;
      padding: 4px 2px;
    }
    .hero__finemark-sub{ color: var(--ink-mute); }

    /* Title card: own row below photo, no longer absolutely positioned */
    .hero__overlay{
      position: relative !important;
      inset: auto !important;
      padding: 0;
      place-items: stretch;
      transform: none !important;
    }
    .hero__card{
      max-width: 100%;
      padding: 22px 20px 24px;
      background: var(--bg-alt);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow:
        0 18px 40px -22px rgba(14,14,16,0.30),
        0 4px 10px -6px rgba(14,14,16,0.14);
      text-align: left;
    }
    .hero__eyebrow{
      font-size: 9.5px;
      gap: 10px;
      letter-spacing: 0.16em;
      margin-bottom: 14px;
      justify-content: flex-start;
    }
    .hero__eyebrow-dash{ width: 14px; }
    .hero__title{
      font-size: clamp(44px, 14vw, 76px);
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .hero__title-l2{
      justify-content: flex-start;
    }
    .hero__sub{
      font-size: 14px;
      max-width: 100%;
      line-height: 1.5;
      margin: 0 0 18px;
      text-align: left;
    }
    .hero__cta{
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      width: 100%;
      justify-content: flex-start;
    }
    .hero__cta .btn{
      justify-content: center;
      padding: 14px 18px;
      font-size: 12px;
    }
    .hero__corner--bl{ display: none; }

    /* Marquee */
    .hero-marquee{ padding: 10px 0; }
    .hero-marquee__track{ font-size: 13px; gap: 32px; }

    /* ===== MANIFESTO ===== */
    .manif__grid{ gap: 36px; }
    .manif__stats{ grid-template-columns: 1fr; }
    .stat{ padding: 22px 20px; }
    .stat__n{ font-size: 36px; }

    /* ===== FORMATS ===== */
    .formats__head{ margin-bottom: 44px; }
    .formats__lede{ font-size: 14px; }
    .fmt-row{
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 22px 0;
    }
    .fmt-row.is-hover{
      padding-left: 0;
      background: none;
    }
    .fmt-row__id{
      font-size: 11px;
      padding-top: 0;
    }
    .fmt-row__top{
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .fmt-row__name{
      font-size: 22px;
      gap: 10px;
    }
    .fmt-row__pin{ font-size: 9px; padding: 4px 8px; letter-spacing: 0.10em; }
    .fmt-row__meta{ font-size: 10px; letter-spacing: 0.06em; }
    .fmt-row__desc{ font-size: 13.5px; }
    .fmt-row__arrow{ display: none; }

    /* ===== COACH ===== */
    .coach__grid{ gap: 32px; }
    .coach__media-wrap{ max-width: 420px; margin: 0 auto; width: 100%; }
    .coach__media-tag{ top: 12px; right: 12px; padding: 6px 10px; font-size: 10px; }
    .coach__media-meta{ padding: 32px 18px 16px; }
    .coach__media-name{ font-size: 15px; }
    /* EREPS badge on mobile: DÉTOURÉE — drop the paper background entirely,
       the turquoise circle of the logo IS the badge. Soft drop-shadow keeps
       it readable on the photo. */
    .coach__ereps{
      top: 14px;
      left: 14px;
      right: auto;
      bottom: auto;
      width: 92px;
      background: transparent;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      transform: rotate(-4deg) !important;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.55));
    }
    .coach__ereps:hover{ transform: rotate(0deg) scale(1.05) !important; }
    .coach__quote{
      font-size: 17px;
      padding-left: 16px;
      margin-bottom: 32px;
    }
    .coach__creds li{
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 16px 0;
    }

    /* ===== PROCESS ===== */
    .process__title{ margin-bottom: 48px; }
    .process__grid{ grid-template-columns: 1fr; }
    .step{ min-height: auto; padding: 28px 22px; }
    .step__connector{ display: none; }
    .step__title{ font-size: 22px; }

    /* ===== PROOF ===== */
    .proof__head{ flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 18px; }
    .proof__grid{ grid-template-columns: repeat(2, 1fr); }
    .proof__cell{ padding: 22px 12px; min-height: 78px; }
    .proof__name{ font-size: 14px; }

    /* ===== CONTACT ===== */
    .bloc--contact{ padding: 60px 0 32px; }
    .contact__grid{ gap: 36px; }
    .contact__lede{ font-size: 14px; margin: 24px 0 32px; }
    .contact__meta{ grid-template-columns: 1fr 1fr; gap: 22px 20px; padding-top: 24px; }
    .contact__meta a, .contact__meta span:last-child{ font-size: 14px; }
    .contact__form{ padding: 22px 20px; gap: 18px; }
    .field-row{ grid-template-columns: 1fr; gap: 18px; }
    .field input, .field select, .field textarea{ font-size: 14px; }
    .btn--lg{ padding: 16px 22px; font-size: 12.5px; }

    /* ===== FOOTER ===== */
    .footer{
      margin-top: 48px;
      padding: 22px 0;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }
    .footer__logo{ width: 38px; height: 38px; }
    .footer__brand{ font-size: 13px; }
    .footer__right{ font-size: 10px; gap: 10px; }
  }

  /* ---------- Very small ---------- */
  @media (max-width: 380px){
    .hero__topbar-right{ gap: 8px; }
    .hero__chip{ font-size: 8.5px; }
    .hero__title{ font-size: clamp(30px, 10vw, 44px); }
    .display-xl{ font-size: clamp(28px, 10vw, 44px); }
    .display-xxl{ font-size: clamp(36px, 13vw, 56px); }
    .contact__meta{ grid-template-columns: 1fr; }
    .proof__grid{ grid-template-columns: 1fr; }
  }

  /* =========================================================
     ===   MOBILE HERO — PRIORITY REORDER (override)       ===
     =========================================================
     Title first, photo smaller, marquee above the fold.
     This block sits at the very end of the cascade so its rules
     win over the earlier @media (max-width: 720px) declarations
     without me having to rewrite that whole block. */
  @media (max-width: 720px){
    .hero__stage{
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      min-height: 0;
    }
    /* Order in the flex column:
         -1  finemark (geo coords, tiny)
          0  title card  (the priority)
          1  photo plane (smaller, supporting) */
    .hero__finemark{ order: -1; padding: 2px 2px 0; justify-content: space-between; align-self: stretch; }
    .hero__overlay{ order: 0; }
    .hero__plane--photo{
      order: 1;
      height: 30vh !important;
      min-height: 200px;
      box-shadow:
        0 14px 30px -18px rgba(14,14,16,0.42),
        0 4px 10px -6px rgba(14,14,16,0.22);
    }

    /* Yellow slab: parked at the photo's bottom-right corner — a real
       plane, not a tiny stamp. Sticks to bottom of stage (= bottom of
       photo, since photo is the last flex child). */
    .hero__plane--yellow{
      top: auto !important;
      left: auto !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 40% !important;
      height: 14vh !important;
      min-height: 96px;
      padding: 12px 14px;
      z-index: 3;
    }
    .hero__plane-yellow-plus{ font-size: clamp(48px, 12vw, 64px); line-height: 0.8; }

    /* Title sized down a touch so the photo + marquee fit above the fold. */
    .hero__title{
      font-size: clamp(40px, 12.5vw, 64px);
      line-height: 0.92;
      margin-bottom: 14px;
    }
    .hero__card{ padding: 20px 18px 20px; }
    .hero__sub{ font-size: 13.5px; margin-bottom: 14px; }

    /* CTAs side-by-side, compact, so they don't eat the viewport. */
    .hero__cta{
      flex-direction: row;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hero__cta .btn{
      flex: 1 1 0;
      min-width: 0;
      justify-content: center;
      padding: 13px 12px;
      font-size: 11px;
      letter-spacing: 0.04em;
    }
    .hero__cta .btn--ghost{
      flex: 0 1 auto;
      padding-left: 16px;
      padding-right: 16px;
    }

    /* Marquee tighter so it's reliably above the fold. */
    .hero-marquee{ padding: 9px 0; }
    .hero-marquee__track{ font-size: 12px; gap: 28px; }

    /* Pillars — tighter on mobile, still horizontal, smaller separators */
    .hero__pillars{
      gap: 10px;
      padding: 8px 0;
      font-size: 12.5px;
      letter-spacing: 0.01em;
      width: 100%;
      justify-content: flex-start;
    }
    .hero__pillar-sep{ width: 1.5px; height: 1em; }
  }
</style>
</head>
